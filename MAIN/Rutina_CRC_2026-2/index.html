<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#080f1f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Rutina CRC 2026</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/icons/icon-192.png" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <section class="month-screen" id="monthScreen">
    <div class="month-screen__inner">
      <div class="month-screen__brand" aria-hidden="true"></div>
      <p class="eyebrow">Comodoro Rugby Club</p>
      <h1>Rutinas CRC 2026</h1>
      <p class="month-screen__subtitle">Elegí el mes de entrenamiento</p>

      <div class="month-grid" aria-label="Rutinas disponibles">
        <button class="month-card month-card--active" type="button" data-routine-month="abril">
          <span>Rutina Abril</span>
        </button>

        <button class="month-card" type="button" data-routine-month="mayo">
          <span>Rutina Mayo</span>
        </button>
      </div>

      <p class="load-error" id="loadError" role="alert" aria-live="polite"></p>
    </div>
  </section>

  <div class="app-shell" id="appShell" hidden>
  <header class="topbar">
    <button class="back-button" id="backToMonths" type="button">← Volver a rutinas</button>
    <div class="topbar-brand">
      <p class="eyebrow">Comodoro Rugby Club</p>
      <h1>Rutina Plantel Superior</h1>
    </div>
    <div class="week-chip" id="weekChip">Semana 1</div>
  </header>

  <main class="container">
    <section class="hero">
      <div>
        <p class="hero-label">Vista actual</p>
        <h2 id="currentDayTitle">Día 1</h2>
        <p id="currentDayDescription">Activación, bloques de fuerza y aeróbico.</p>
      </div>

      <div class="controls">
        <label for="weekSelect">Semana</label>
        <select id="weekSelect">
          <option value="1">Semana 1</option>
          <option value="2">Semana 2</option>
          <option value="3">Semana 3</option>
          <option value="4">Semana 4</option>
        </select>
      </div>
    </section>

    <nav class="tabs">
      <button class="tab active" data-day="dia1">Día 1</button>
      <button class="tab" data-day="dia2">Día 2</button>
      <button class="tab" data-day="dia3">Día 3</button>
    </nav>

    <section class="layout">
      <aside class="summary-card">
        <h3>Resumen del día</h3>
        <ul id="summaryList"></ul>
      </aside>

      <section id="routineView" class="routine-view"></section>
    </section>
  </main>
  </div>

  <div class="video-modal" id="videoModal" aria-hidden="true">
    <div class="video-modal__content" role="dialog" aria-modal="true" aria-label="Video del ejercicio">
      <button class="video-modal__close" id="videoModalClose" type="button" aria-label="Cerrar video">X</button>
      <iframe
        id="videoFrame"
        title="Video del ejercicio"
        src=""
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        allowfullscreen>
      </iframe>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
